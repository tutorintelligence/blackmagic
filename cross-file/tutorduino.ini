# This a cross-file for the tutorduino probe (BMP clone hardware).
# It defines the same default target support as the native probe.

[binaries]
c = 'arm-none-eabi-gcc'
cpp = 'arm-none-eabi-g++'
ld = 'arm-none-eabi-gcc'
ar = 'arm-none-eabi-ar'
nm = 'arm-none-eabi-nm'
strip = 'arm-none-eabi-strip'
objcopy = 'arm-none-eabi-objcopy'
objdump = 'arm-none-eabi-objdump'
size = 'arm-none-eabi-size'

[host_machine]
system = 'bare-metal'
cpu_family = 'arm'
cpu = 'arm'
endian = 'little'

[project options]
probe = 'tutorduino'
targets = 'cortexm,lpc,nrf,nxp,renesas,rp,sam,stm,ti'
rtt_support = false
bmd_bootloader = true
