# This a cross-file for the tutorduino probe (BMP clone hardware).
# Targets are limited to cortexm+stm to fit within 128KB flash.
# The primary use-case is debugging STM32G0B1 (Cortex-M0+).

[binaries]
c = 'arm-none-eabi-gcc'
cpp = 'arm-none-eabi-g++'
ld = 'arm-none-eabi-gcc'
ar = 'arm-none-eabi-ar'
nm = 'arm-none-eabi-nm'
strip = 'arm-none-eabi-strip'
objcopy = 'arm-none-eabi-objcopy'
objdump = 'arm-none-eabi-objdump'
size = 'arm-none-eabi-size'

[host_machine]
system = 'bare-metal'
cpu_family = 'arm'
cpu = 'arm'
endian = 'little'

[project options]
probe = 'tutorduino'
targets = 'cortexm,stm'
rtt_support = false
bmd_bootloader = true
# UART SWO is disabled (DMA ch5 is used for USART1 RX); force Manchester-only encoding.
trace_protocol = '1'
